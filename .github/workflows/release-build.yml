name: Build Multi-Platform On Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-all:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            file_base: kkapi_windows_amd64
            bin_ext: .exe
            archive_ext: .zip
          - goos: darwin
            goarch: amd64
            file_base: kkapi_macos_amd64
            bin_ext: ""
            archive_ext: .tar.gz
          - goos: darwin
            goarch: arm64
            file_base: kkapi_macos_arm64
            bin_ext: ""
            archive_ext: .tar.gz
          - goos: linux
            goarch: amd64
            file_base: kkapi_linux_amd64
            bin_ext: ""
            archive_ext: .tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }} binary
        shell: bash
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags "-s -w" -o "${{ matrix.file_base }}${{ matrix.bin_ext }}" .

      - name: Package artifact
        shell: bash
        run: |
          archive_name="${{ matrix.file_base }}${{ matrix.archive_ext }}"
          mkdir -p release_bundle
          cp "${{ matrix.file_base }}${{ matrix.bin_ext }}" "release_bundle/${{ matrix.file_base }}${{ matrix.bin_ext }}"
          cp "config.yaml" "release_bundle/config.yaml"
          if [ "${{ matrix.archive_ext }}" = ".zip" ]; then
            (cd release_bundle && zip -r "../${archive_name}" .)
          else
            tar -czf "${archive_name}" -C release_bundle .
          fi

      - name: Upload asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.file_base }}${{ matrix.archive_ext }}
          overwrite_files: true
