name: Build Windows x64 On Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Windows x64 binary
        shell: pwsh
        run: |
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -trimpath -ldflags "-s -w" -o "kkapi_windows_x64.exe" .

      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "release_bundle" | Out-Null
          Copy-Item "kkapi_windows_x64.exe" "release_bundle\\kkapi_windows_x64.exe"
          Copy-Item "config.yaml" "release_bundle\\config.yaml"
          Compress-Archive -Path "release_bundle\\*" -DestinationPath "kkapi_windows_x64.zip"

      - name: Upload asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: kkapi_windows_x64.zip
          overwrite_files: true
